name: Weekly Blog Post

on:
  schedule:
    # Every Wednesday at 9:00 AM UTC. Spaced from Thread-Patrol's
    # Monday slot to even out cron load and PR-review attention.
    - cron: '0 9 * * 3'
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Custom keyword (leave blank to use next from queue)'
        required: false
        default: ''

# Auto-merge mode (option B from product spec): the workflow commits
# directly to main and deploys to Cloudflare Pages without opening a
# PR. The blocking quality gates inside scripts/generate-post.js are
# the only safety net — if a draft fails, the script regenerates up
# to 2 more times before failing the workflow.
permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate blog post
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.keyword }}" ]; then
            node scripts/generate-post.js "${{ github.event.inputs.keyword }}"
          else
            node scripts/generate-post.js
          fi

      - name: Build site
        run: npx astro build

      - name: Commit + push to main
        run: |
          git config user.name  "echo-synch-bot"
          git config user.email "noreply@echo-synch.com"
          git add src/content/blog/${{ steps.generate.outputs.slug }}.md src/data/keyword-queue.json
          git commit -m "blog: ${{ steps.generate.outputs.title }}

          Auto-generated by Claude Sonnet 4.6 — see .github/workflows/publish-blog.yml.
          All quality gates passed (banned-phrase, em-dash cap, word count,
          duplicate-title, H2 count, required-artifact)."
          git push origin main

      - name: Deploy to Cloudflare Pages
        # The Cloudflare Pages → GitHub webhook for echosynch-website is
        # known broken — wrangler-direct-upload is the canonical deploy
        # path until that's fixed (see docs/PROJECT_PAPER.md §10.6.1).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist \
            --project-name=echosynch-website \
            --branch=main \
            --commit-dirty=true

      - name: Summary
        if: always()
        run: |
          echo "## 📝 Blog post published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Title:** ${{ steps.generate.outputs.title }}" >> $GITHUB_STEP_SUMMARY
          echo "**Slug:**  \`${{ steps.generate.outputs.slug }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Live:**  https://echo-synch.com/blog/${{ steps.generate.outputs.slug }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated by Claude Sonnet 4.6, all quality gates passed, deployed to Cloudflare Pages." >> $GITHUB_STEP_SUMMARY
